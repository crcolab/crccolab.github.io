title: Cyborg Resilience Co-lab
description: >-
  研究 × 科技 × 藝術的跨域行動平台。探索戰爭、災難與科技風險交疊下的數位韌性。
  Cyborg Resilience Co-lab (CRC) — civic hackers, digital-rights activists,
  researchers and artists working on digital resilience in Taiwan.
url: "https://crcolab.art"
lang: zh-Hant
timezone: Asia/Taipei

# needed so upcoming-event pages emit before their date arrives
future: true

plugins:
  - jekyll-sitemap

collections:
  news:
    output: true
    permalink: /news/:name/
  events:
    output: true
    permalink: /events/:name/
  records:
    output: true
    permalink: /records/:name/
  news_en:
    output: true
    permalink: /en/news/:name/
  events_en:
    output: true
    permalink: /en/events/:name/
  records_en:
    output: true
    permalink: /en/records/:name/

defaults:
  - scope: { type: news }
    values: { layout: item, section: news, collection_name: news, locale: zh-Hant }
  - scope: { type: events }
    values: { layout: item, section: events, collection_name: events, locale: zh-Hant }
  - scope: { type: records }
    values: { layout: item, section: records, collection_name: records, locale: zh-Hant }
  - scope: { type: news_en }
    values: { layout: item, section: news, collection_name: news_en, locale: en-US }
  - scope: { type: events_en }
    values: { layout: item, section: events, collection_name: events_en, locale: en-US }
  - scope: { type: records_en }
    values: { layout: item, section: records, collection_name: records_en, locale: en-US }

exclude:
  - README.md
  - LICENSE
  - CLAUDE.md
  - docs/
  - .superpowers/
  - Gemfile
  - Gemfile.lock
  - vendor/
